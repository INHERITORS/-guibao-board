<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>瑰宝榜 · Dashboard</title>
    <style>
      :root{--ink:#23211d;--paper:#f7f2e8;--muted:rgba(35,33,29,.66);--line:rgba(35,33,29,.12);--jade:#2f6f63;--red:#b9472e;--gold:#c89b3c;--white:rgba(255,255,255,.78)}
      *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Noto Sans SC","Microsoft YaHei",system-ui,sans-serif;background:var(--paper);color:var(--ink)}header{position:sticky;top:0;z-index:10;border-bottom:1px solid var(--line);background:rgba(247,242,232,.94);backdrop-filter:blur(12px)}.nav,main{width:min(1240px,calc(100% - 32px));margin:0 auto}.nav{display:flex;min-height:64px;align-items:center;justify-content:space-between;gap:12px}.brand{font-weight:900}.mark{display:inline-grid;width:36px;height:36px;place-items:center;border-radius:8px;background:var(--red);color:white;margin-right:8px}main{padding:24px 0 56px}h1{font-size:clamp(32px,5vw,56px);margin:10px 0}.desc{color:var(--muted);line-height:1.7}.grid{display:grid;gap:14px}.hero{grid-template-columns:.9fr 1.1fr;align-items:start}.panel,.card,.table-wrap{border:1px solid var(--line);border-radius:8px;background:var(--white)}.panel{padding:18px}.cards{grid-template-columns:repeat(3,1fr);margin:20px 0}.card{padding:16px}.card b{display:block;font-size:28px}.table-wrap{overflow-x:auto}table{width:100%;min-width:980px;border-collapse:collapse}th{background:var(--ink);color:var(--paper);text-align:left}th,td{padding:12px;border-top:1px solid var(--line);white-space:nowrap}.rank-list{display:grid;gap:9px}.rank-item{display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:center;border:1px solid var(--line);border-radius:8px;background:rgba(248,243,232,.72);padding:12px}.score{color:var(--red);font-weight:900}.admin-layout{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,360px);gap:16px;align-items:start}.admin-layout>*{min-width:0}input,textarea,button{font:inherit;border:1px solid var(--line);border-radius:8px;background:white;color:var(--ink)}input{min-height:38px;padding:0 10px;width:100%}textarea{width:100%;min-height:72px;padding:10px;line-height:1.5}button{min-height:40px;padding:0 12px;font-weight:800;cursor:pointer}.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}.actions{display:flex;gap:8px;flex-wrap:wrap}.editable{display:grid;gap:10px}.editable-item{border:1px solid var(--line);border-radius:8px;background:rgba(248,243,232,.72);padding:12px}.editable-row{display:grid;grid-template-columns:1fr auto;gap:8px}.input-small{width:74px}.hint{font-size:13px;color:var(--muted)}@media(max-width:900px){.hero,.admin-layout,.cards{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <header><div class="nav"><div class="brand"><span class="mark">榜</span>瑰宝榜</div><strong>公开总榜</strong></div></header>
    <main id="app"></main>
    <script>
      const storageKey = "guibao-public-pages-v1";
      const pin = "2027";
      const seedRows = [
        ["niulang-zhinu","牛郎织女","欣颖","",0,0,0,0,0],["menora","Menora（泰国）","民强 & 守恒","",0,0,0,0,0],["hunli","婚礼","珈玮 & 惠翎","",0,0,0,0,0],["baishezhuan","白蛇传","慧翎","",0,0,0,0,0],["mulan","花木兰","凯钲","",0,0,0,0,0],["change","嫦娥奔月","可薇","",0,0,0,0,0],["liang-shanbo","梁山伯与祝英台","竣铭","",0,0,0,0,0],["mengjiangnu","孟姜女","采萤","",0,0,0,0,0],["nezha","哪吒","民强","",0,0,0,0,0],["guanyu","关公","素岑","",0,0,0,0,0],["mazu","妈祖","健美","",0,0,0,0,0],["baosheng","保生大帝","喻萱","",0,0,0,0,0],["qixi","七夕","惠翎","",0,0,0,0,0],["yuanxiao","元宵","凯钲","",0,0,0,0,0],["shadow-puppet","皮影戏","可薇","",0,0,0,0,0],["lion-dance","舞狮","竣铭","",0,0,0,0,0],["clan-stories","姓氏故事","采萤","",0,0,0,0,0]
      ];
      let state = JSON.parse(localStorage.getItem(storageKey) || "null") || {
        rows: seedRows.map((r, i) => ({id:r[0],name:r[1],curators:r[2],assistants:r[3],a:r[4],b1:r[5],b2:r[6],c:r[7],fengyun:r[8],display_order:i+1})),
        todos:[{title:"补录 B1",body:"请检查尚未录入的 B1 内部分。"},{title:"复核风云分",body:"风云加分较高的策展，锁定前需二次确认证据。"},{title:"提醒同侪投票",body:"尚未提交本月投票的策展，请在月会前完成。"}],
        settings:[{title:"公开显示",body:"排名、总分、A/B/C/风云分、亮点。"},{title:"内部保留",body:"扣分原因、评语、人工调整记录。"},{title:"发布出口",body:"网页总榜、WhatsApp 文字、打印月榜。"}]
      };
      const n=v=>Number.parseFloat(v||"0")||0, esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
      const score=r=>{const b=n(r.b1)+Math.min(15,n(r.b2));const c=Math.min(40,n(r.c));const base=n(r.a)+b+c;return{b,c,base,total:base+n(r.fengyun)}};
      const sorted=()=>[...state.rows].map(r=>({...r,...score(r)})).sort((a,b)=>b.total-a.total);
      function save(){localStorage.setItem(storageKey,JSON.stringify(state))}
      function publicView(){const rows=sorted();app.innerHTML='<section class="grid hero"><div><p class="desc">2027 丁未年槟城庙会 · 对外 Dashboard</p><h1>瑰宝榜</h1><p class="desc">让每一个瑰宝策展的履约、品质、内容深度与风云表现被看见。</p><div class="grid cards"><div class="card"><b>17</b><span class="desc">瑰宝策展</span></div><div class="card"><b>6月</b><span class="desc">当前评分月</span></div><div class="card"><b>Top 12</b><span class="desc">晋级线</span></div></div></div><aside class="panel"><h2>本月 Top 6</h2><div class="rank-list">'+rows.slice(0,6).map((r,i)=>'<div class="rank-item"><b>'+(i+1)+'</b><div><b>'+esc(r.name)+'</b><div class="hint">策展人：'+esc(r.curators||"-")+'</div><div class="hint">辅佐员：'+esc(r.assistants||"-")+'</div></div><span class="score">'+r.total+'</span></div>').join("")+'</div></aside></section><h2>公开总榜</h2><div class="table-wrap"><table><thead><tr><th>排名</th><th>策展名称</th><th>策展人</th><th>辅佐员</th><th>A 履约</th><th>B 品质</th><th>C 内容</th><th>基础</th><th>风云</th><th>本月</th></tr></thead><tbody>'+rows.map((r,i)=>'<tr><td>'+(i+1)+'</td><td><b>'+esc(r.name)+'</b></td><td>'+esc(r.curators||"-")+'</td><td>'+esc(r.assistants||"-")+'</td><td>'+r.a+'</td><td>'+r.b+'</td><td>'+r.c+'</td><td>'+r.base+'</td><td>+'+r.fengyun+'</td><td><b>'+r.total+'</b></td></tr>').join("")+'</tbody></table></div>'}
      function editList(list){return list.map((x,i)=>'<div class="editable-item"><div class="editable-row"><input data-note="'+i+'" data-field="title" value="'+esc(x.title)+'"/><button data-del="'+i+'">删除</button></div><textarea data-note="'+i+'" data-field="body">'+esc(x.body)+'</textarea></div>').join("")}
      publicView();
    </script>
  </body>
</html>
