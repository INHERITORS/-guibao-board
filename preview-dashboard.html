<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>瑰宝榜 · 对外 Dashboard 预览</title>
    <style>
      :root {
        --ink: #22201c;
        --paper: #f8f3e8;
        --jade: #2f6f63;
        --cinnabar: #b9472e;
        --gold: #c89b3c;
        --indigo: #34456b;
        --line: rgba(34, 32, 28, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
        background: linear-gradient(180deg, #fbf7ed 0%, var(--paper) 100%);
        color: var(--ink);
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid var(--line);
        background: rgba(248, 243, 232, 0.92);
        backdrop-filter: blur(12px);
      }

      .nav,
      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      .nav {
        display: flex;
        min-height: 64px;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
      }

      .mark {
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        border-radius: 8px;
        background: var(--cinnabar);
        color: white;
      }

      .tabs {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        white-space: nowrap;
      }

      .tabs span {
        border-radius: 8px;
        padding: 9px 12px;
        color: rgba(34, 32, 28, 0.72);
        font-size: 14px;
        font-weight: 700;
      }

      .tabs .active {
        background: white;
        color: var(--ink);
      }

      main {
        padding: 28px 0 52px;
      }

      .hero {
        display: grid;
        grid-template-columns: 0.9fr 1.1fr;
        gap: 28px;
        align-items: start;
      }

      .eyebrow {
        width: fit-content;
        border-left: 4px solid var(--cinnabar);
        background: rgba(255, 255, 255, 0.7);
        padding: 8px 14px;
        font-size: 14px;
        font-weight: 800;
      }

      h1 {
        margin: 22px 0 12px;
        font-size: clamp(42px, 8vw, 76px);
        line-height: 0.98;
      }

      .lead {
        max-width: 620px;
        color: rgba(34, 32, 28, 0.76);
        font-size: 18px;
        line-height: 1.8;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-top: 24px;
      }

      .stat,
      .panel,
      .table-wrap,
      .card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
      }

      .stat {
        padding: 16px;
      }

      .stat b {
        display: block;
        font-size: 28px;
      }

      .stat span {
        color: rgba(34, 32, 28, 0.64);
        font-size: 13px;
        font-weight: 700;
      }

      .panel {
        padding: 18px;
      }

      .panel-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      .pill {
        border-radius: 8px;
        background: var(--jade);
        color: white;
        padding: 8px 10px;
        font-size: 13px;
        font-weight: 800;
      }

      .rank-list {
        display: grid;
        gap: 9px;
      }

      .rank-item {
        display: grid;
        grid-template-columns: 42px 1fr auto;
        align-items: center;
        gap: 12px;
        border: 1px solid rgba(34, 32, 28, 0.1);
        border-radius: 8px;
        background: rgba(248, 243, 232, 0.72);
        padding: 12px;
      }

      .rank-no {
        font-size: 20px;
        font-weight: 900;
      }

      .rank-name {
        font-weight: 900;
      }

      .rank-person {
        color: rgba(34, 32, 28, 0.58);
        font-size: 13px;
      }

      .rank-score {
        color: var(--cinnabar);
        font-weight: 900;
      }

      .section-title {
        margin: 34px 0 16px;
        font-size: 26px;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        min-width: 880px;
        border-collapse: collapse;
      }

      th {
        background: var(--ink);
        color: var(--paper);
        font-size: 14px;
        text-align: left;
      }

      th,
      td {
        padding: 13px 14px;
        border-top: 1px solid rgba(34, 32, 28, 0.1);
        white-space: nowrap;
      }

      td {
        font-size: 14px;
      }

      .up {
        color: var(--jade);
        font-weight: 900;
      }

      .down {
        color: var(--cinnabar);
        font-weight: 900;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
      }

      .card {
        padding: 18px;
      }

      .card h3 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .bar {
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(34, 32, 28, 0.1);
      }

      .fill {
        height: 100%;
        border-radius: inherit;
      }

      @media (max-width: 860px) {
        .hero,
        .cards {
          grid-template-columns: 1fr;
        }

        .stats {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="nav">
        <div class="brand"><span class="mark">榜</span><span>瑰宝榜</span></div>
        <nav class="tabs">
          <span class="active">总榜</span>
          <span>策展</span>
          <span>风云题</span>
          <span>现场榜</span>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div>
          <div class="eyebrow">2027 丁未年槟城庙会 · 对外 Dashboard</div>
          <h1>瑰宝榜</h1>
          <p class="lead">
            让每一个瑰宝策展的履约、品质、内容深度与风云表现被看见。
            公开页显示排名、进度与亮点；内部评语保留给策划组。
          </p>
          <div class="stats">
            <div class="stat"><b>17</b><span>瑰宝策展</span></div>
            <div class="stat"><b>6月</b><span>当前评分月</span></div>
            <div class="stat"><b>Top 12</b><span>庙会冲刺晋级线</span></div>
          </div>
        </div>

        <aside class="panel">
          <div class="panel-top">
            <div>
              <strong>实时总榜</strong>
              <div class="rank-person">本月 Top 6</div>
            </div>
            <span class="pill">2026-06</span>
          </div>
          <div class="rank-list" id="rank-list"></div>
        </aside>
      </section>

      <h2 class="section-title">公开总榜</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>排名</th><th>策展名称</th><th>策展人</th><th>辅佐员</th><th>A 履约</th><th>B 品质</th><th>C 内容</th><th>基础</th><th>风云</th><th>本月</th><th>YTD</th><th>升跌</th>
            </tr>
          </thead>
          <tbody id="board-body"></tbody>
        </table>
      </div>

      <h2 class="section-title">每策展分数拆解</h2>
      <section class="cards">
        <div class="card"><h3>A 履约</h3><p>出席与里程碑</p><div class="bar"><div class="fill" style="width: 93%; background: var(--jade)"></div></div></div>
        <div class="card"><h3>B 品质</h3><p>策划组 + 同侪</p><div class="bar"><div class="fill" style="width: 73%; background: var(--indigo)"></div></div></div>
        <div class="card"><h3>C 内容深度</h3><p>全年累积制</p><div class="bar"><div class="fill" style="width: 75%; background: var(--gold)"></div></div></div>
        <div class="card"><h3>风云题</h3><p>月题加分</p><div class="bar"><div class="fill" style="width: 100%; background: var(--cinnabar)"></div></div></div>
      </section>
    </main>
    <script>
      const storageKey = "guibao-admin-preview-v1";
      const syncChannel = "BroadcastChannel" in window ? new BroadcastChannel("guibao-board-sync") : null;
      const defaultCurations = [
        ["niulang-zhinu", "牛郎织女", "欣颖", "辅佐员 A / 辅佐员 B", 28, 15, 7, 30, 120],
        ["hongloumeng", "红楼梦", "雯靖", "辅佐员 A", 30, 10, 8, 28, 60],
        ["xiyouji", "西游记", "喻萱", "辅佐员 A / 辅佐员 B", 18, 5, 7, 22, 180],
        ["baishezhuan", "白蛇传", "慧翎", "", 26, 15, 9, 24, 80],
        ["mulan", "花木兰", "凯钲", "", 24, 0, 5, 24, 90],
        ["change", "嫦娥奔月", "可薇", "", 22, 10, 9, 18, 100],
        ["liang-shanbo", "梁山伯与祝英台", "竣铭", "", 25, 10, 6, 20, 50],
        ["mengjiangnu", "孟姜女", "采萤", "", 20, 5, 5, 18, 40],
        ["nezha", "哪吒", "民强", "", 29, 15, 10, 26, 70],
        ["guanyu", "关公", "素岑", "", 27, 10, 6, 24, 60],
        ["mazu", "妈祖", "健美", "", 30, 15, 8, 30, 90],
        ["baosheng", "保生大帝", "喻萱", "", 21, 10, 4, 16, 40],
        ["qixi", "七夕", "惠翎", "", 24, 10, 6, 22, 60],
        ["yuanxiao", "元宵", "凯钲", "", 23, 5, 4, 18, 35],
        ["shadow-puppet", "皮影戏", "可薇", "", 26, 15, 7, 24, 65],
        ["lion-dance", "舞狮", "竣铭", "", 28, 10, 6, 20, 80],
        ["clan-stories", "姓氏故事", "采萤", "", 22, 0, 3, 12, 20]
      ];

      function number(value) {
        return Number.parseFloat(value || "0") || 0;
      }

      function loadRows() {
        const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");
        return defaultCurations
          .map(([key, name, curator, assistant, a, b1, b2, c, fengyun]) => {
            const draftRow = saved.rows?.[key] || {};
            const publishedRow = saved.publishedRows?.[key] || {};
            const row = { ...draftRow, ...publishedRow };
            const score = {
              a: number(row.a ?? a),
              b1: number(row.b1 ?? b1),
              b2: Math.min(15, number(row.b2 ?? b2)),
              c: Math.min(40, number(row.c ?? c)),
              fengyun: number(row.fengyun ?? fengyun)
            };
            const b = score.b1 + score.b2;
            const base = score.a + b + score.c;
            const total = base + score.fengyun;
            return {
              key,
              name: Object.prototype.hasOwnProperty.call(row, "name") ? row.name || "未命名策展" : name,
              curator: Object.prototype.hasOwnProperty.call(row, "curator") ? row.curator || "未填写" : curator,
              assistant: Object.prototype.hasOwnProperty.call(row, "assistant") ? row.assistant || "-" : assistant || "-",
              ...score,
              b,
              base,
              total,
              ytd: total
            };
          })
          .sort((left, right) => right.total - left.total);
      }

      function render() {
        const rows = loadRows();
        document.querySelector("#rank-list").innerHTML = rows
          .slice(0, 6)
          .map(
            (row, index) => `<div class="rank-item"><span class="rank-no">${index + 1}</span><div><div class="rank-name">${row.name}</div><div class="rank-person">策展人：${row.curator}</div><div class="rank-person">辅佐员：${row.assistant}</div></div><span class="rank-score">${row.total}</span></div>`
          )
          .join("");
        document.querySelector("#board-body").innerHTML = rows
          .map(
            (row, index) => `<tr><td>${index + 1}</td><td><b>${row.name}</b></td><td>${row.curator}</td><td>${row.assistant}</td><td>${row.a}</td><td>${row.b}</td><td>${row.c}</td><td>${row.base}</td><td>+${row.fengyun}</td><td><b>${row.total}</b></td><td>${row.ytd}</td><td>${index < 3 ? '<span class="up">↑</span>' : "→"}</td></tr>`
          )
          .join("");
      }

      window.addEventListener("storage", render);
      syncChannel?.addEventListener("message", (event) => {
        if (event.data?.type === "published") {
          render();
        }
      });
      setInterval(render, 2000);
      render();
    </script>
  </body>
</html>
